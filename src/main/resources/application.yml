spring:
  datasource:
    url: jdbc:mysql://localhost:3306/${DEV_DB_NAME}?allowPublicKeyRetrieval=true&useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret:
    key: ${JWT_SECRET_KEY}
  expiration:
    access-token: 3600000
    refresh-token: 604800000

logging:
  level:
    org.hibernate.SQL: debug
