spring:
  datasource:
    # H2 메모리 DB 사용함
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # 테스트 시작 시 테이블 생성, 종료 시 삭제함
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret:
    key: your_very_long_test_secret_key_for_testing_purposes_only_32_chars