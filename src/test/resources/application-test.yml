spring:
  datasource:
    # H2 메모리 DB 사용함
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop # 테스트 시작 시 테이블 생성, 종료 시 삭제함
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret:
    key: MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
  expiration:
    access-token: 3600000
    refresh-token: 604800000

payment:
  server:
    url: http://localhost:8081
  store-id: test-store
  api-secret: test-secret

logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

